# Local mirror of the Hetzner origin (Section 11). Brings up Postgres (the ledger),
# Redis (the queue), the API, the recruitment worker, and the Node tracking-edge
# fallback. In production the edge is Cloudflare Workers and the front-end is
# Cloudflare Pages — those are not in this compose, which models the origin only.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# NOTE: the default app runtime is the in-memory store, so Postgres/Redis here are
# wired for the production path (DATABASE_URL / REDIS_URL) and the off-box backup
# story; set USE_POSTGRES=true to switch the adapter.
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vantage
      POSTGRES_PASSWORD: vantage
      POSTGRES_DB: vantage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vantage"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      PORT: "8787"
      DATABASE_URL: postgres://vantage:vantage@postgres:5432/vantage
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod
      CORS_ORIGINS: http://localhost:5173
      # Section 11 rule: transactional mail leaves via an ESP, never this box.
      ESP_PROVIDER: resend
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["node", "--import", "tsx", "packages/recruitment/src/worker.ts"]
    environment:
      DATABASE_URL: postgres://vantage:vantage@postgres:5432/vantage
      REDIS_URL: redis://redis:6379
      # Section 11 rule: scrape through rotating/residential proxies, never the box IP.
      PROXY_URL: ""
    depends_on:
      - postgres
      - redis

  edge:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ["node", "--import", "tsx", "packages/tracking-edge/src/server.ts"]
    environment:
      EDGE_PORT: "8788"
    ports:
      - "8788:8788"

volumes:
  pgdata:
